# Production Docker stack. Secrets are required (no insecure defaults) and the
# database is not exposed to the host. Run behind a TLS-terminating proxy /
# load balancer, since production cookies are issued with Secure + SameSite=None.
#
# Usage:
#   cp .env.example .env   # then set strong JWT_SECRET / JWT_REFRESH_SECRET etc.
#   docker compose -f docker-compose.prod.yml up --build -d

services:
  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?set MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-automation_practice}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:?set MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET:?set a strong JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set a strong JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    volumes:
      - uploads:/app/server/uploads
    expose:
      - '5000'

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_ENVIRONMENT: production
    restart: always
    depends_on:
      - server
    ports:
      - '${CLIENT_PORT:-8080}:80'

volumes:
  mongo-data:
  uploads:
