# Local / single-host Docker stack: MongoDB + API server + Nginx-served client.
# Usage: `docker compose up --build` then open http://localhost:8080
#
# The server runs in development cookie mode so authentication works over plain
# HTTP on localhost. For a hardened deployment use docker-compose.prod.yml.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme_local_password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-automation_practice}
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:changeme_local_password@mongo:27017/automation_practice?authSource=admin}
      JWT_SECRET: ${JWT_SECRET:-local_dev_access_secret_change_me_please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local_dev_refresh_secret_change_me_please}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - uploads:/app/server/uploads
    ports:
      - '5000:5000'

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_ENVIRONMENT: production
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  mongo-data:
  uploads:
