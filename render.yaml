# Render Blueprint for the backend API.
# Create the service via Render → New → Blueprint (it reads this file), or set
# the same Build/Start commands manually in a Web Service.
services:
  - type: web
    name: automation-practice-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace server
    startCommand: npm run start --workspace server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # JWT secrets are generated by Render automatically.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: MAX_UPLOAD_BYTES
        value: "5242880"
      - key: LOG_LEVEL
        value: info
      # Set these two in the dashboard / blueprint prompt:
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
